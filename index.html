/* DRAG HOOK */
function useDrag(handleRef, winRef) {
  const drag = useRef(null);
  useEffect(() => {
    const handle = handleRef.current;
    if (!handle) return;
    const onDown = (e) => {
      if (e.target.closest(".chrome-btns,.toolbar,.content,.statusbar,.dropdown")) return;
      const r = winRef.current.getBoundingClientRect();
      drag.current = { ox: e.clientX - r.left, oy: e.clientY - r.top };
      e.preventDefault();
    };
    const onMove = (e) => {
      if (!drag.current) return;
      const p = winRef.current.parentElement.getBoundingClientRect();
      let x = Math.max(0, Math.min(e.clientX - drag.current.ox - p.left, p.width - 60));
      let y = Math.max(0, Math.min(e.clientY - drag.current.oy - p.top, p.height - 40));
      winRef.current.style.left = x + "px";
      winRef.current.style.top  = y + "px";
    };
    const onUp = () => { drag.current = null; };
    handle.addEventListener("mousedown", onDown);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);
    return () => {
      handle.removeEventListener("mousedown", onDown);
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
    };
  }, []);
}

function MdiWindow({ id, title, icon, width, height, posX, posY, focused, onFocus, onClose, children }) {

  useDrag(tbRef, winRef);
  return (

      onMouseDown={onFocus}>
      <div ref={tbRef} className="titlebar">

  );
}

function DataGrid({ cols, rows, selId, onSel }) {
  return (
    <div className="grid-wrap">
      <table className="w11-grid">
        <thead><tr>{cols.map(c => <th key={c.k}>{c.l}</th>)}</tr></thead>
        <tbody>
          {rows.map((r, i) => (
            <tr key={r.id ?? i} className={r.id === selId ? "sel" : ""} onClick={() => onSel && onSel(r)}>
              {cols.map(c => <td key={c.k}>{c.render ? c.render(r) : r[c.k]}</td>)}
            </tr>
          ))}
          {!rows.length && (
            <tr><td colSpan={cols.length} style={{ textAlign: "center", color: "#999", fontStyle: "italic", padding: 14 }}>
              Aucun enregistrement
            </td></tr>
          )}
        </tbody>
      </table>
    </div>
  );
}

function FormRow({ label, lw = 150, children }) {
  return (
    <div className="form-row">
      <label style={{ minWidth: lw, textAlign: "right" }}>{label}</label>
      {children}

}

const W11Input = ({ value, onChange, maxLen, style, readOnly, placeholder, type = "text" }) => (
  <input type={type} className="w11-input" value={value}
    onChange={e => onChange && onChange(e.target.value)}

);

const W11Select = ({ value, onChange, opts, style }) => (
  <select className="w11-select" value={value} onChange={e => onChange(e.target.value)} style={{ minWidth: 160, ...style }}>
    <option value="">— Sélectionner —</option>
    {opts.map(o => <option key={o.v} value={o.v}>{o.l}</option>)}
  </select>
);

function Toolbar({ btns }) {
  return (
    <div className="toolbar">
      {btns.map((b, i) =>
        b === "|" ? <div key={i} className="tb-sep" /> :
          <button key={i} className="tb-btn" onClick={b.onClick} disabled={!!b.disabled}>
            {b.icon} {b.label}
          </button>
      )}
    </div>
  );
}

function StatusBar({ items }) {
  return (
    <div className="statusbar">
      {items.filter(Boolean).map((it, i) => <span key={i} className="sb-item">{it}</span>)}
    </div>
  );
}

/* CRUD SCREEN GENERIQUE */
function CrudScreen({ title, icon, cols, rows, setRows, fields, empty, validate, extra = "", onAudit }) {
  const [sel, setSel]   = useState(null);
  const [form, setForm] = useState(empty);
  const [mode, setMode] = useState("view");
  const [msg, setMsg]   = useState(null);
  const [del, setDel]   = useState(false);
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const startNew  = () => { setForm({ ...empty }); setSel(null); setMode("new"); setMsg(null); };
  const startEdit = () => { if (!sel) return; setForm({ ...sel }); setMode("edit"); setMsg(null); };
  const cancel    = () => { setMode("view"); setMsg(null); setSel(null); setForm(empty); };
  const save = () => {
    const err = validate(form, rows, mode === "edit" ? sel?.id : null);
    if (err) { setMsg({ t: "err", m: err }); return; }
    const k0 = cols[0].k;
    if (mode === "new") {
      const nr = { ...form, id: Date.now() };
      setRows(p => [...p, nr]); setSel(nr);
      onAudit && onAudit("Création", `${title} | ${k0}: ${form[k0]}`);
    } else {
      setRows(p => p.map(r => r.id === sel.id ? { ...form, id: r.id } : r));
      setSel({ ...form, id: sel.id });
      onAudit && onAudit("Modification", `${title} | ${k0}: ${form[k0]}`);
    }
    setMode("view"); setMsg({ t: "ok", m: "Enregistrement sauvegardé." });
  };
  const doDelete = () => {
    const k0 = cols[0].k;
    onAudit && onAudit("Suppression", `${title} | ${k0}: ${sel[k0]}`);
    setRows(p => p.filter(r => r.id !== sel.id));
    setSel(null); setMode("view"); setDel(false);
    setMsg({ t: "ok", m: "Supprimé." });
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <Toolbar btns={[
        { icon: "➕", label: "Nouveau",     onClick: startNew },
        { icon: "✏️", label: "Modifier",    onClick: startEdit, disabled: !sel },
        { icon: "🗑️", label: "Supprimer",   onClick: () => sel && setDel(true), disabled: !sel },
        "|",
        { icon: "↩️", label: "Annuler",     onClick: cancel,    disabled: mode === "view" },
        { icon: "💾", label: "Enregistrer", onClick: save,      disabled: mode === "view" },
      ]} />
      <div className="content">
        <div className="section-bar">{icon} {title}</div>
        {msg && <Alert type={msg.t === "err" ? "err" : "ok"} icon={msg.t === "err" ? "✕" : "✓"}>{msg.m}</Alert>}
        <DataGrid cols={cols} rows={rows} selId={sel?.id}
          onSel={r => { if (mode === "view") { setSel(r); setForm({ ...r }); } }} />
        {mode !== "view" && (
          <div className="group" style={{ marginTop: 10 }}>
            <span className="group-title">{mode === "new" ? "➕ Nouvel enregistrement" : "✏️ Modification"}</span>
            {fields(form, upd)}
          </div>
        )}
      </div>
      <StatusBar items={[`${rows.length} enreg.`, sel ? `Sél. : ${sel[cols[0].k]}` : "", extra]} />
      {del && (
        <div className="modal-bg">
          <div className="modal-box">
            <div className="modal-title">🗑️ Confirmer la suppression</div>
            <div className="modal-body"><Alert type="warn" icon="⚠">Action irréversible.</Alert></div>
            <div className="modal-footer">
              <button className="w11-btn" onClick={() => setDel(false)}>Annuler</button>
              <button className="w11-btn danger" onClick={doDelete}>🗑️ Supprimer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CComptegScreen({ data, setData, projets, onAudit }) {
  const [search, setSearch] = useState("");

  const filtered = data.filter(r =>
    (r.projet || "").toLowerCase().includes(search.toLowerCase()) ||
    r.compteTompro.includes(search) ||
    r.libelleTompro.toLowerCase().includes(search.toLowerCase()) ||
    r.compteSnell.includes(search)
  );
  const save = () => {
    if (!form.projet)                   { setMsg({ t: "err", m: "Projet obligatoire." }); return; }
    if (!form.compteTompro.trim() || !form.compteSnell.trim()) { setMsg({ t: "err", m: "Comptes obligatoires." }); return; }

      { setMsg({ t: "err", m: "Déjà enregistré pour ce projet." }); return; }
    if (mode === "new") { setData(p => [...p, { ...form, id: Date.now() }]); onAudit && onAudit("Création", `CCOMPTEG | ${form.compteTompro}→${form.compteSnell} (${form.projet})`); }
    else               { setData(p => p.map(r => r.id === sel.id ? { ...form, id: r.id } : r)); onAudit && onAudit("Modification", `CCOMPTEG | ${form.compteTompro} (${form.projet})`); }
    setMode("view"); setMsg({ t: "ok", m: "Correspondance enregistrée." });
  };
  const doDelete = () => {
    onAudit && onAudit("Suppression", `CCOMPTEG | ${sel.compteTompro} (${sel.projet})`);

    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <Toolbar btns={[
        { icon: "➕", label: "Nouveau",     onClick: () => { setForm({ projet: "", compteTompro: "", libelleTompro: "", compteSnell: "", libelleSnell: "" }); setSel(null); setMode("new"); setMsg(null); } },

        "|",
        { icon: "↩️", label: "Annuler",     onClick: () => { setMode("view"); setMsg(null); }, disabled: mode === "view" },
        { icon: "💾", label: "Enregistrer", onClick: save, disabled: mode === "view" },
      ]} />
      <div className="content">
        <div className="section-bar">🔗 Correspondances TomPro ↔ SNEL (CCOMPTEG)</div>
        <Alert type="info" icon="💡">Si une correspondance est absente lors du traitement, une fenêtre de création s'affiche automatiquement.</Alert>
        {msg && <Alert type={msg.t === "err" ? "err" : "ok"} icon={msg.t === "err" ? "✕" : "✓"}>{msg.m}</Alert>}
        <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
          <W11Input value={search} onChange={setSearch} placeholder="🔍 Rechercher (projet, compte...)" style={{ width: 300 }} />
          <button className="w11-btn" onClick={() => setSearch("")}>✕</button>
        </div>

          cols={[
            { k: "projet",        l: "Projet" },
            { k: "compteTompro",  l: "Compte TomPro" },
            { k: "libelleTompro", l: "Libellé TomPro" },

          ]}

          onSel={r => { if (mode === "view") { setSel(r); setForm({ ...r }); } }}
        />

          <div className="group" style={{ marginTop: 10 }}>
            <span className="group-title">{mode === "new" ? "➕ Nouvelle correspondance" : "✏️ Modification"}</span>

/* CJOURNAL — 2 chiffres num, statut, un seul Actif */
function CJournalScreen({ data, setData, onAudit }) {
  const [sel,  setSel]  = useState(null);
  const [form, setForm] = useState({ code: "", libelle: "", statut: "Inactif" });
  const [mode, setMode] = useState("view");
  const [msg,  setMsg]  = useState(null);
  const [del,  setDel]  = useState(false);
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const save = () => {
    if (!/^\d{2}$/.test(form.code))  { setMsg({ t: "err", m: "Code : exactement 2 chiffres numériques." }); return; }
    if (!form.libelle.trim())         { setMsg({ t: "err", m: "Libellé obligatoire." }); return; }
    if (data.some(r => r.code === form.code && r.id !== (mode === "edit" ? sel?.id : null)))
      { setMsg({ t: "err", m: "Ce code existe déjà." }); return; }
    let newId = mode === "edit" ? sel.id : Date.now();
    let nd = mode === "new"
      ? [...data, { ...form, id: newId }]
      : data.map(r => r.id === sel.id ? { ...form, id: r.id } : r);
    if (form.statut === "Actif") nd = nd.map(r => r.id !== newId ? { ...r, statut: "Inactif" } : r);
    setData(nd);
    onAudit && onAudit(mode === "new" ? "Création" : "Modification", `CJOURNAL | code:${form.code} statut:${form.statut}`);
    setMode("view"); setMsg({ t: "ok", m: "Journal enregistré." });
  };
  const doDelete = () => {
    onAudit && onAudit("Suppression", `CJOURNAL | code:${sel.code}`);
    setData(p => p.filter(r => r.id !== sel.id));
    setSel(null); setMode("view"); setDel(false); setMsg({ t: "ok", m: "Supprimé." });
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <Toolbar btns={[
        { icon: "➕", label: "Nouveau",     onClick: () => { setForm({ code: "", libelle: "", statut: "Inactif" }); setSel(null); setMode("new"); setMsg(null); } },
        { icon: "✏️", label: "Modifier",    onClick: () => { if (!sel) return; setForm({ ...sel }); setMode("edit"); setMsg(null); }, disabled: !sel },
        { icon: "🗑️", label: "Supprimer",   onClick: () => sel && setDel(true), disabled: !sel },
        "|",
        { icon: "↩️", label: "Annuler",     onClick: () => { setMode("view"); setMsg(null); }, disabled: mode === "view" },
        { icon: "💾", label: "Enregistrer", onClick: save, disabled: mode === "view" },
      ]} />
      <div className="content">
        <div className="section-bar">📓 Journaux SNEL (CJOURNAL)</div>
        <Alert type="info" icon="ℹ">Code : 2 chiffres numériques uniquement. Un seul journal peut être Actif à la fois.</Alert>
        {msg && <Alert type={msg.t === "err" ? "err" : "ok"} icon={msg.t === "err" ? "✕" : "✓"}>{msg.m}</Alert>}
        <DataGrid
          cols={[
            { k: "code",    l: "Code (2 chiff.)" },
            { k: "libelle", l: "Libellé" },
            { k: "statut",  l: "Statut", render: r => <StatutBadge statut={r.statut} /> },
          ]}
          rows={data} selId={sel?.id}
          onSel={r => { if (mode === "view") { setSel(r); setForm({ ...r }); } }}
        />
        {mode !== "view" && (
          <div className="group" style={{ marginTop: 10 }}>
            <span className="group-title">{mode === "new" ? "➕ Nouveau journal" : "✏️ Modification"}</span>
            <FormRow label="Code Journal (2 chiff.) :" lw={190}>
              <W11Input value={form.code} onChange={v => upd("code", v.replace(/\D/g, "").slice(0, 2))} maxLen={2} style={{ width: 60 }} />
              <span style={{ fontSize: 10, color: "#888" }}>2 chiffres uniquement</span>
            </FormRow>
            <FormRow label="Libellé :" lw={190}><W11Input value={form.libelle} onChange={v => upd("libelle", v)} style={{ width: 280 }} /></FormRow>
            <FormRow label="Statut :" lw={190}>
              <select className="w11-select" value={form.statut} onChange={e => upd("statut", e.target.value)} style={{ width: 160 }}>
                <option value="Actif">Actif</option>

              </select>
              {form.statut === "Actif" && <span style={{ fontSize: 10, color: "#107C10", marginLeft: 8 }}>Désactivera les autres journaux</span>}
            </FormRow>
          </div>
        )}
      </div>
      <StatusBar items={[`${data.length} journaux`, `Actif : ${data.find(r => r.statut === "Actif")?.code || "aucun"}`]} />
      {del && (
        <div className="modal-bg"><div className="modal-box">
          <div className="modal-title">🗑️ Confirmer la suppression</div>
          <div className="modal-body"><Alert type="warn" icon="⚠">Action irréversible.</Alert></div>
          <div className="modal-footer">
            <button className="w11-btn" onClick={() => setDel(false)}>Annuler</button>
            <button className="w11-btn danger" onClick={doDelete}>🗑️ Supprimer</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

/* CSR — statut Actif/Inactif (un seul), validation format */
function CSRScreen({ data, setData, onAudit }) {
  const [sel,  setSel]  = useState(null);
  const [form, setForm] = useState({ code: "", libelle: "", statut: "Inactif" });
  const [mode, setMode] = useState("view");
  const [msg,  setMsg]  = useState(null);
  const [del,  setDel]  = useState(false);
  const ext = extractCSR(form.code.toUpperCase());
  const save = () => {
    if (!validateCSRFormat(form.code)) { setMsg({ t: "err", m: "Format invalide : pos1=chiffre, pos2=lettre, pos3-6=4 chiffres. Ex: 1A0123" }); return; }
    if (!form.libelle.trim())           { setMsg({ t: "err", m: "Libellé obligatoire." }); return; }
    if (mode === "new" && data.some(r => r.code === form.code.toUpperCase())) { setMsg({ t: "err", m: "Code CSR existant." }); return; }
    const row = { code: form.code.toUpperCase(), libelle: form.libelle, statut: form.statut, ...extractCSR(form.code.toUpperCase()) };
    let newId = mode === "edit" ? sel.id : Date.now();
    let nd = mode === "new"
      ? [...data, { ...row, id: newId }]
      : data.map(r => r.id === sel.id ? { ...row, id: r.id } : r);
    if (row.statut === "Actif") nd = nd.map(r => r.id !== newId ? { ...r, statut: "Inactif" } : r);
    setData(nd);
    onAudit && onAudit(mode === "new" ? "Création" : "Modification", `CSR | ${row.code} statut:${row.statut}`);
    setMode("view"); setMsg({ t: "ok", m: "Unité budgétaire enregistrée." });
  };
  const doDelete = () => {
    onAudit && onAudit("Suppression", `CSR | ${sel.code}`);
    setData(p => p.filter(r => r.id !== sel.id));
    setSel(null); setMode("view"); setDel(false); setMsg({ t: "ok", m: "Supprimé." });
  };
  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <Toolbar btns={[
        { icon: "➕", label: "Nouveau",     onClick: () => { setForm({ code: "", libelle: "", statut: "Inactif" }); setSel(null); setMode("new"); setMsg(null); } },
        { icon: "✏️", label: "Modifier",    onClick: () => { if (!sel) return; setForm({ code: sel.code, libelle: sel.libelle, statut: sel.statut }); setMode("edit"); setMsg(null); }, disabled: !sel },
        { icon: "🗑️", label: "Supprimer",   onClick: () => sel && setDel(true), disabled: !sel },
        "|",
        { icon: "↩️", label: "Annuler",     onClick: () => { setMode("view"); setMsg(null); }, disabled: mode === "view" },
        { icon: "💾", label: "Enregistrer", onClick: save, disabled: mode === "view" },
      ]} />
      <div className="content">
        <div className="section-bar">🏢 Code Unité Budgétaire (CSR)</div>
        <Alert type="info" icon="ℹ">Format : CFILIERE (1 chiffre) + CREGION (1 lettre) + CEMET (4 chiffres). Ex: <b>1A0123</b>. Un seul CSR Actif à la fois.</Alert>
        {msg && <Alert type={msg.t === "err" ? "err" : "ok"} icon={msg.t === "err" ? "✕" : "✓"}>{msg.m}</Alert>}
        <DataGrid
          cols={[
            { k: "code",     l: "Code CSR" },
            { k: "cfiliere", l: "CFILIERE (chiff.)" },
            { k: "cregion",  l: "CREGION (lettre)" },
            { k: "cemet",    l: "CEMET (4 chiff.)" },
            { k: "libelle",  l: "Libellé" },
            { k: "statut",   l: "Statut", render: r => <StatutBadge statut={r.statut} /> },
          ]}
          rows={data} selId={sel?.id}
          onSel={r => { if (mode === "view") { setSel(r); setForm({ code: r.code, libelle: r.libelle, statut: r.statut }); } }}
        />
        {mode !== "view" && (
          <div className="group" style={{ marginTop: 10 }}>
            <span className="group-title">{mode === "new" ? "➕ Nouveau CSR" : "✏️ Modification"}</span>
            <div style={{ display: "flex", gap: 24, flexWrap: "wrap" }}>
              <div>
                <FormRow label="Code CSR (6 car.) :" lw={165}>
                  <W11Input value={form.code} onChange={v => setForm(f => ({ ...f, code: v.toUpperCase().slice(0, 6) }))} maxLen={6} style={{ width: 100 }} />
                  <span style={{ fontSize: 10, color: "#888" }}>ex: 1A0123</span>
                </FormRow>
                <FormRow label="Libellé :" lw={165}><W11Input value={form.libelle} onChange={v => setForm(f => ({ ...f, libelle: v }))} style={{ width: 240 }} /></FormRow>
                <FormRow label="Statut :" lw={165}>
                  <select className="w11-select" value={form.statut} onChange={e => setForm(f => ({ ...f, statut: e.target.value }))} style={{ width: 160 }}>
                    <option value="Actif">Actif</option>
                    <option value="Inactif">Inactif</option>
                  </select>
                  {form.statut === "Actif" && <span style={{ fontSize: 10, color: "#107C10", marginLeft: 8 }}>Désactivera les autres</span>}
                </FormRow>
              </div>
              <div className="extraction-box">
                <p style={{ fontSize: 11, fontWeight: 600, color: "#005FB8", marginBottom: 8 }}>⚡ Extraction automatique</p>
                {[["CFILIERE", ext.cfiliere, "1 chiffre (pos.1)"], ["CREGION", ext.cregion, "1 lettre (pos.2)"], ["CEMET", ext.cemet, "4 chiffres (pos.3-6)"]].map(([k, v, h]) => (
                  <div key={k} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
                    <span style={{ fontSize: 11, fontWeight: 600, width: 64 }}>{k}</span>
                    <input readOnly value={v} className="w11-input" style={{ width: 74 }} />
                    <span style={{ fontSize: 10, color: "#888" }}>{h}</span>
                  </div>
                ))}
                {form.code.length === 6 && (
                  <p style={{ fontSize: 10, marginTop: 6, color: validateCSRFormat(form.code) ? "#107C10" : "#C42B1C" }}>
                    {validateCSRFormat(form.code) ? "✓ Format valide" : "✕ Format invalide"}
                  </p>
                )}
              </div>
            </div>
          </div>
        )}
      </div>
      <StatusBar items={[`${data.length} unités`, `Actif : ${data.find(r => r.statut === "Actif")?.code || "aucun"}`, "6 car."]} />
      {del && (
        <div className="modal-bg"><div className="modal-box">
          <div className="modal-title">🗑️ Confirmer la suppression</div>
          <div className="modal-body"><Alert type="warn" icon="⚠">Action irréversible.</Alert></div>
          <div className="modal-footer">
            <button className="w11-btn" onClick={() => setDel(false)}>Annuler</button>
            <button className="w11-btn danger" onClick={doDelete}>🗑️ Supprimer</button>
          </div>
        </div></div>
      )}
    </div>
  );
}

/* TRAITEMENT — CJOURNAL et CSR filtrés sur Actif */
function TraitementScreen({ data, onAudit }) {
  const { projets, exercices, ccompteg, setCcompteg, cjournal, cjnl, cgestionn, csr } = data;
  const cjournalActif = cjournal.filter(r => r.statut === "Actif");
  const csrActif      = csr.filter(r => r.statut === "Actif");

  const [form,       setForm]       = useState({ projet: "", journal: "", exercice: "", gestionnaire: "", ub: "", taux: "2850" });
  const [fileName,   setFileName]   = useState("Export_Mars2026.csv");
  const [progress,   setProgress]   = useState(0);
  const [processing, setProcessing] = useState(false);
  const [results,    setResults]    = useState([]);
  const [logs,       setLogs]       = useState([]);
  const [done,       setDone]       = useState(false);
  const [missing,    setMissing]    = useState(null);
  const [newCorr,    setNewCorr]    = useState({ compteTompro: "", libelleTompro: "", compteSnell: "", libelleSnell: "" });

  const timerRef = useRef(null);
  const pendRef  = useRef([]);
  const corrRef  = useRef(ccompteg);
  useEffect(() => { corrRef.current = ccompteg; }, [ccompteg]);

  const set    = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const addLog = (m, t = "info") => setLogs(p => [...p, { m, t, ts: new Date().toLocaleTimeString() }]);

  const ubInfo   = csrActif.find(r => r.code === form.ub);
  const jnlInfo  = cjournalActif.find(r => r.code === form.journal);
  const projInfo = projets.find(r => r.code === form.projet);
  const exInfo   = exercices.find(r => r.code === form.exercice);
  const formOK   = form.projet && form.journal && form.exercice && form.gestionnaire && form.ub && form.taux && fileName;

  const buildLines = useCallback((rows, corr) => {
    const res = []; let op = 0; const fm = {};
    rows.forEach(row => {
      op++;
      const cD = corr.find(c => c.compteTompro === row.compteDebT)?.compteSnell || "???";
      const cC = corr.find(c => c.compteTompro === row.compteCrT)?.compteSnell  || "???";
      const jp = (jnlInfo?.code || "01").substring(0, 2);
      const an = exInfo?.code || "2025"; const mo = 3;
      const fk = jp + an + mo; fm[fk] = (fm[fk] || 0) + 1;
      const fo = buildAFOLI(jp, an, mo, fm[fk]);
      const jt = cjnl.find(c => c.code === row.journal);
      const ci = (jt?.comptePrincipal || "601100").substring(0, 5) + (ubInfo?.code || "");
      const tx = parseFloat(form.taux) || 1;
      const base = {
        CFILIERE: ubInfo?.cfiliere || "", CJOURNAL: jnlInfo?.code || "",
        CBORDREAU: `CDP_${projInfo?.code || ""}`, COPERATION: String(op).padStart(2, "0"),
        CGESTIONN: form.gestionnaire, CREGION: ubInfo?.cregion || "",
        CUNITE: "", CBANQUE: "", CECHEANCE: "", CMVT: "", CCOMPTEI: "",
        CSR: ubInfo?.code || "", CPIECE: "0" + row.numPiece, CAPPARI: "",
        CLIBMVT: row.libelle.substring(0, 40), CINDICL: "", CXCOMPT: "", CDEVISE: "",
        CINDICEPCH: "", CDPCH: "", CINDICECRS: "", CTRESORERI: "",
        CEMET: ubInfo?.cemet || "", AFOLI: fo, CIMPUT: ci,
        DPERIODE: `${an}0${mo}`, DINSCRIPT: row.date,
        ENT_FIN: ubInfo?.code || "", NUMCHEQ: "", NPERIODE: "", CPTEARECL: "", CPTEAREFL: "",
      };
      res.push({ ...base, CLIGNE: "01", XLIGNE: "0", CCOMPTEG: cD, ADEBMVTZ: (row.montantDev*tx).toFixed(2), ACREMVTZ: "0.00", ADEBMVT: row.montantDev.toFixed(2), ACREMVT: "0.00" });
      res.push({ ...base, CLIGNE: "02", XLIGNE: "0", CCOMPTEG: cC, ADEBMVTZ: "0.00", ACREMVTZ: (row.montantDev*tx).toFixed(2), ADEBMVT: "0.00", ACREMVT: row.montantDev.toFixed(2) });
    });
    return res;
  }, [form, ubInfo, jnlInfo, projInfo, exInfo, cjnl]);

  const runNext = useCallback(() => {
    if (pendRef.current.length === 0) {
      const res = buildLines(TOMPRO_RAW, corrRef.current);
      setResults(res); setProgress(100); setProcessing(false); setDone(true);
      addLog(`Traitement terminé : ${res.length} lignes générées.`, "ok");
      onAudit && onAudit("Traitement", `Projet:${form.projet} | Journal:${form.journal} | Exercice:${form.exercice} | CSR:${form.ub} | ${res.length} lignes`);
      return;
    }
    const row  = pendRef.current[0];
    const step = TOMPRO_RAW.length - pendRef.current.length + 1;
    const miss = [row.compteDebT, row.compteCrT].find(c => !corrRef.current.find(x => x.compteTompro === c));
    if (miss) {
      setProgress(Math.round((step / TOMPRO_RAW.length) * 100));
      addLog(`Compte ${miss} absent de CCOMPTEG — saisie requise`, "warn");
      setProcessing(false); setMissing({ compte: miss, row });
      setNewCorr({ compteTompro: miss, libelleTompro: "", compteSnell: "", libelleSnell: "" }); return;
    }
    pendRef.current.shift();
    setProgress(Math.round((step / TOMPRO_RAW.length) * 100));
    addLog(`Op. n°${row.numPiece} — ${row.libelle}`);
    timerRef.current = setTimeout(runNext, 320);
  }, [buildLines, form, onAudit]);

  const startProcessing = () => {
    if (!formOK) return;
    setResults([]); setLogs([]); setProgress(0); setDone(false); setProcessing(true);
    pendRef.current = [...TOMPRO_RAW];
    addLog("Lecture du fichier source TomPro...");
    timerRef.current = setTimeout(runNext, 500);
  };
  const saveMissing = () => {
    if (!newCorr.compteSnell) return;
    const e = { ...newCorr, id: Date.now(), projet: form.projet };
    setCcompteg(p => [...p, e]); corrRef.current = [...corrRef.current, e];
    onAudit && onAudit("Création", `CCOMPTEG (via traitement) | ${newCorr.compteTompro}→${newCorr.compteSnell}`);
    setMissing(null); pendRef.current.shift(); setProcessing(true);
    addLog(`Correspondance créée : ${newCorr.compteTompro}→${newCorr.compteSnell}. Reprise...`, "ok");
    timerRef.current = setTimeout(runNext, 400);
  };
  const exportCSV = () => {
    if (!results.length) return;
    const keys = Object.keys(results[0]);
    const csv = [keys.join(";"), ...results.map(r => keys.map(k => r[k]).join(";"))].join("\n");
    const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = genFileName(exInfo?.code || "2025", 3) + ".csv"; a.click();
    addLog(`Export CSV : ${genFileName(exInfo?.code || "2025", 3)}.csv`, "ok");
  };

  const tDeb = results.reduce((s, r) => s + parseFloat(r.ADEBMVT || 0), 0);
  const tCr  = results.reduce((s, r) => s + parseFloat(r.ACREMVT || 0), 0);
  const equil = Math.abs(tDeb - tCr) < 0.01;
  const COLS = ["CFILIERE","CJOURNAL","CBORDREAU","COPERATION","CLIGNE","CGESTIONN","CREGION","CCOMPTEG","CSR","CPIECE","CLIBMVT","ADEBMVTZ","ACREMVTZ","ADEBMVT","ACREMVT","CEMET","AFOLI","CIMPUT","DPERIODE","DINSCRIPT","ENT_FIN"];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%" }}>
      <Toolbar btns={[
        { icon: "⚡", label: "Lancer le Traitement", onClick: startProcessing, disabled: !formOK || processing },
        "|",
        { icon: "📄", label: "Exporter CSV",  onClick: exportCSV,  disabled: !done },
        "|",
        { icon: "🔄", label: "Réinitialiser", onClick: () => { setResults([]); setLogs([]); setProgress(0); setDone(false); clearTimeout(timerRef.current); setProcessing(false); } },
      ]} />
      <div className="content">
        <div className="group" style={{ marginBottom: 10 }}>
          <span className="group-title">📋 Entête — Paramètres de Traitement</span>
          {cjournalActif.length === 0 && <Alert type="warn" icon="⚠">Aucun Journal SNEL actif — activez-en un dans Structure → Journaux SNEL.</Alert>}
          {csrActif.length === 0      && <Alert type="warn" icon="⚠">Aucune Unité Budgétaire active — activez-en une dans Structure → Unité Budgétaire.</Alert>}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "6px 16px", marginBottom: 8 }}>
            <FormRow label="Projet :" lw={110}>
              <W11Select value={form.projet} onChange={v => set("projet", v)}
                opts={projets.map(p => ({ v: p.code, l: `${p.code} — ${p.libelle}` }))} style={{ width: 190 }} />
            </FormRow>
            <FormRow label="Journal SNEL :" lw={110}>
              <W11Select value={form.journal} onChange={v => set("journal", v)}
                opts={cjournalActif.map(j => ({ v: j.code, l: `${j.code} — ${j.libelle}` }))} style={{ width: 180 }} />
            </FormRow>
            <FormRow label="Exercice :" lw={85}>
              <W11Select value={form.exercice} onChange={v => set("exercice", v)}
                opts={exercices.map(e => ({ v: e.code, l: e.libelle }))} style={{ width: 155 }} />
            </FormRow>
            <FormRow label="Gestionnaire :" lw={110}>
              <W11Select value={form.gestionnaire} onChange={v => set("gestionnaire", v)}
                opts={cgestionn.map(g => ({ v: g.code, l: `${g.code} — ${g.libelle}` }))} style={{ width: 190 }} />
            </FormRow>
            <FormRow label="Unité Budgétaire :" lw={110}>
              <W11Select value={form.ub} onChange={v => set("ub", v)}
                opts={csrActif.map(s => ({ v: s.code, l: `${s.code} — ${s.libelle}` }))} style={{ width: 180 }} />
            </FormRow>
            <FormRow label="Taux CDF/USD :" lw={85}>
              <W11Input value={form.taux} onChange={v => set("taux", v.replace(/\D/g, ""))} style={{ width: 100 }} />
            </FormRow>
          </div>
          {ubInfo && (
            <div style={{ fontSize: 11, color: "#5D5D5D", background: "rgba(0,95,184,0.05)", border: "1px solid rgba(0,95,184,0.12)", borderRadius: 4, padding: "4px 10px", marginBottom: 8 }}>
              UB : CFILIERE=<b>{ubInfo.cfiliere}</b> | CREGION=<b>{ubInfo.cregion}</b> | CEMET=<b>{ubInfo.cemet}</b> &nbsp;|&nbsp; CBORDREAU=<b>CDP_{projInfo?.code || "?"}</b>
            </div>
          )}
          <div style={{ borderTop: "1px solid rgba(0,0,0,0.07)", paddingTop: 8 }}>
            <p style={{ fontSize: 11, fontWeight: 600, marginBottom: 5 }}>📂 Fichier source TomPro</p>
            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <W11Input value={fileName} onChange={setFileName} style={{ flex: 1, minWidth: 200 }} />
              <button className="w11-btn" onClick={() => setFileName(`Export_${projInfo?.code || "PROJ"}_${form.exercice || "2025"}.csv`)}>📂 Simuler</button>
              <button className={`w11-btn${formOK && !processing ? " primary" : ""}`} onClick={startProcessing} disabled={!formOK || processing}>
                {processing ? "⏳ En cours..." : "⚡ Lancer"}
              </button>
            </div>
            {!formOK && <p style={{ fontSize: 10, color: "#C42B1C", marginTop: 3 }}>Tous les champs sont obligatoires avant de lancer le traitement.</p>}
          </div>
        </div>

        {(processing || done || progress > 0) && (
          <div style={{ marginBottom: 10 }}>
            <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 3 }}>
              <span style={{ color: "#5D5D5D" }}>{processing ? "⏳ Traitement en cours..." : done ? "✓ Traitement terminé" : ""}</span>
              <span style={{ fontWeight: 600, color: "#005FB8" }}>{progress}%</span>
            </div>
            <div className="progress-wrap"><div className="progress-bar" style={{ width: `${progress}%` }} /></div>
          </div>
        )}

        {logs.length > 0 && (
          <div className="log-console">
            {logs.map((l, i) => (
              <div key={i} className={`log-line log-${l.t}`}>
                <span style={{ opacity: 0.5, marginRight: 8 }}>[{l.ts}]</span>{l.m}
              </div>
            ))}
          </div>
        )}

        {done && results.length > 0 && (
          <div className="group">
            <span className="group-title">📊 Résultat — Visualisation avant Export</span>
            <div className="stat-row">
              {[["Lignes", results.length], ["Opérations", results.length / 2],
                ["Débit total", `${tDeb.toLocaleString("fr-FR", { minimumFractionDigits: 2 })} USD`],
                ["Crédit total", `${tCr.toLocaleString("fr-FR",  { minimumFractionDigits: 2 })} USD`],
                ["Équilibre", equil ? "✓ OK" : "✕ NON"],
                ["Fichier", genFileName(exInfo?.code || "2025", 3)],
              ].map(([l, v]) => (
                <div key={l} className="stat-card"><strong>{String(v)}</strong><span>{l}</span></div>
              ))}
            </div>
            <div className="grid-wrap" style={{ maxHeight: 200 }}>
              <table className="w11-grid" style={{ fontSize: 9 }}>
                <thead><tr>{COLS.map(c => <th key={c} style={{ fontSize: 8, padding: "3px 6px" }}>{c}</th>)}</tr></thead>
                <tbody>
                  {results.map((r, i) => (
                    <tr key={i}>{COLS.map(c => <td key={c} style={{ maxWidth: 90, fontSize: 9 }}>{r[c]}</td>)}</tr>
                  ))}
                </tbody>
              </table>
            </div>
            <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, marginTop: 8, alignItems: "center" }}>
              <span style={{ fontSize: 10, color: "#888" }}>Fichier : <b>{genFileName(exInfo?.code || "2025", 3)}</b></span>
              <button className="w11-btn success" onClick={exportCSV}>📄 Exporter CSV</button>
            </div>
          </div>
        )}
      </div>
      <StatusBar items={[
        processing ? `⏳ ${progress}%` : done ? `✓ ${results.length} lignes` : "En attente",
        form.projet || "Projet ?", form.journal ? `JNL: ${form.journal}` : "Journal ?",
        form.ub ? `CSR: ${form.ub}` : "CSR ?",
        form.taux ? `${parseInt(form.taux).toLocaleString("fr-FR")} CDF/USD` : "",
      ]} />
      {missing && (
        <div className="modal-bg">
          <div className="modal-box">
            <div className="modal-title">🔗 Compte absent — {missing.compte}</div>
            <div className="modal-body">
              <Alert type="warn" icon="⚠">Le compte TomPro <b>{missing.compte}</b> n'a pas de correspondance SNEL. Créez-la pour continuer.</Alert>
              <FormRow label="Compte TomPro :"       lw={170}><W11Input value={newCorr.compteTompro}  readOnly style={{ width: 160 }} /></FormRow>
              <FormRow label="Libellé TomPro :"      lw={170}><W11Input value={newCorr.libelleTompro} onChange={v => setNewCorr(f => ({ ...f, libelleTompro: v }))} style={{ width: 210 }} /></FormRow>
              <FormRow label="Compte SNEL (11 car.):" lw={170}><W11Input value={newCorr.compteSnell}  onChange={v => setNewCorr(f => ({ ...f, compteSnell: v.slice(0, 11) }))} style={{ width: 160 }} /></FormRow>
              <FormRow label="Libellé SNEL :"        lw={170}><W11Input value={newCorr.libelleSnell}  onChange={v => setNewCorr(f => ({ ...f, libelleSnell: v }))} style={{ width: 210 }} /></FormRow>
            </div>
            <div className="modal-footer">
              <button className="w11-btn" onClick={() => { setMissing(null); setProcessing(false); }}>⏹ Annuler</button>
              <button className="w11-btn primary" onClick={saveMissing} disabled={!newCorr.compteSnell}>💾 Créer et Continuer ⚡</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* WIN DEFS */
const WIN_DEFS = {
  traitement:  { title: "Traitement — Moulinette TomPro → SNEL", icon: "⚡",  w: 880, h: 600 },
  projets:     { title: "Structure — Liste des Projets",          icon: "📁",  w: 560, h: 420 },
  exercice:    { title: "Structure — Exercice Comptable",         icon: "📅",  w: 720, h: 490 },
  ccompteg:    { title: "Structure — Correspondances Comptes",    icon: "🔗",  w: 800, h: 530 },
  cjournal:    { title: "Structure — Journaux SNEL",              icon: "📓",  w: 520, h: 440 },
  cjnl:        { title: "Structure — Journaux TomPro",            icon: "📔",  w: 660, h: 470 },
  cgestionn:   { title: "Structure — Code Gestionnaire",          icon: "🏷️",  w: 500, h: 380 },
  csr:         { title: "Structure — Unité Budgétaire (CSR)",     icon: "🏢",  w: 740, h: 540 },
  users:       { title: "Administration — Utilisateurs",          icon: "👤",  w: 660, h: 490 },
  dbconfig:    { title: "Configuration Base de Données",          icon: "⚙️",  w: 520, h: 420 },
  tracabilite: { title: "Administration — Journal d'Audit",       icon: "📋",  w: 840, h: 530 },
};

/* APP PRINCIPALE */
function App() {
  const [loggedIn,     setLoggedIn]     = useState(false);
  const [dbConfigured, setDbConfigured] = useState(false);
  const [currentUser,  setCurrentUser]  = useState(null);
  const [loginForm,    setLoginForm]    = useState({ login: "administrateur", password: "" });
  const [loginErr,     setLoginErr]     = useState("");
  const [windows,      setWindows]      = useState([]);
  const [focusedId,    setFocusedId]    = useState(null);
  const [openMenu,     setOpenMenu]     = useState(null);
  const [users,        setUsers]        = useState(INIT.users);
  const [projets,      setProjets]      = useState(INIT.projets);
  const [exercices,    setExercices]    = useState(INIT.exercices);
  const [ccompteg,     setCcompteg]     = useState(INIT.ccompteg);
  const [cjournal,     setCjournal]     = useState(INIT.cjournal);
  const [cjnl,         setCjnl]         = useState(INIT.cjnl);
  const [cgestionn,    setCgestionn]    = useState(INIT.cgestionn);
  const [csr,          setCsr]          = useState(INIT.csr);
  const [audit,        setAudit]        = useState(INIT.audit);
  const [clock,        setClock]        = useState(new Date().toLocaleTimeString("fr-FR"));

  useEffect(() => {
    const t = setInterval(() => setClock(new Date().toLocaleTimeString("fr-FR")), 1000);
    return () => clearInterval(t);
  }, []);

  const currentUserRef = useRef(currentUser);
  useEffect(() => { currentUserRef.current = currentUser; }, [currentUser]);

  const addAudit = useCallback((action, details) => {
    setAudit(p => [...p, {
      id: Date.now(), ts: nowStr(),
      user: currentUserRef.current?.login || "—",
      action, entite: action, details,
    }]);
  }, []);

  const doLogin = () => {
    const u = users.find(u => u.login === loginForm.login && u.mdp === loginForm.password && u.actif);
    if (u) {
      setCurrentUser(u); setLoggedIn(true); setLoginErr("");
      setAudit(p => [...p, { id: Date.now(), ts: nowStr(), user: u.login, action: "Connexion", entite: "Auth", details: `Connexion — rôle: ${u.role}` }]);
    } else setLoginErr("Login ou mot de passe incorrect.");
  };

  const openWindow = useCallback((key) => {
    setWindows(prev => {
      if (prev.find(w => w.key === key)) { setFocusedId(key); return prev; }
      const def = WIN_DEFS[key];
      const off = prev.length * 28;
      return [...prev, { key, x: 36 + off, y: 28 + off, w: def.w, h: def.h }];
    });
    setFocusedId(key); setOpenMenu(null);
  }, []);

  const closeWindow = useCallback((key) => {
    setWindows(prev => prev.filter(w => w.key !== key));
    setFocusedId(prev => prev === key ? null : prev);
  }, []);

  const renderContent = (key) => {
    const trData = { projets, exercices, ccompteg, setCcompteg, cjournal, cjnl, cgestionn, csr };
    switch (key) {
      case "traitement":  return <TraitementScreen data={trData} onAudit={addAudit} />;
      case "projets":     return <ProjetsScreen    data={projets}   setData={setProjets}   onAudit={addAudit} />;
      case "exercice":    return <ExerciceScreen   data={exercices} setData={setExercices} projets={projets} onAudit={addAudit} />;
      case "ccompteg":    return <CComptegScreen   data={ccompteg}  setData={setCcompteg}  projets={projets} onAudit={addAudit} />;
      case "cjournal":    return <CJournalScreen   data={cjournal}  setData={setCjournal}  onAudit={addAudit} />;
      case "cjnl":        return <CJNLScreen       data={cjnl}      setData={setCjnl}      projets={projets} onAudit={addAudit} />;
      case "cgestionn":   return <CGestionnScreen  data={cgestionn} setData={setCgestionn} onAudit={addAudit} />;
      case "csr":         return <CSRScreen        data={csr}       setData={setCsr}       onAudit={addAudit} />;
      case "users":       return <UsersScreen      data={users}     setData={setUsers}     onAudit={addAudit} />;
      case "dbconfig":    return <DBConfigScreen   onSave={() => { setDbConfigured(true); closeWindow("dbconfig"); }} />;
      case "tracabilite": return <TracabiliteScreen data={audit} setData={setAudit} />;
      default: return null;
    }
  };

  if (!loggedIn) return (
    <div className="login-shell">
      <div className="login-card">
        <div className="login-header">
          <span style={{ display: "flex", alignItems: "center", gap: 7, fontSize: 12, fontWeight: 600 }}>
            <span style={{ fontSize: 15 }}>🔄</span> Moulinette TomPro → SNEL
          </span>
          <div style={{ display: "flex" }}>
            {["—","□","✕"].map(c => <button key={c} style={{ width: 40, height: 28, border: "none", background: "transparent", cursor: "pointer", fontSize: 10 }}>{c}</button>)}
          </div>
        </div>
        <div className="login-body">
          <div style={{ textAlign: "center", marginBottom: 22 }}>
            <div style={{ fontSize: 44, lineHeight: 1 }}>🔄</div>
            <p style={{ fontSize: 16, fontWeight: 600, color: "#1C1C1C", marginTop: 10 }}>Moulinette TomPro → SNEL</p>
            <p style={{ fontSize: 12, color: "#5D5D5D", marginTop: 3 }}>Société SNEL — v2.0.0</p>
          </div>
          {loginErr && <Alert type="err" icon="✕">{loginErr}</Alert>}
          <div style={{ marginBottom: 12 }}>
            <label className="w11-label">Nom d'utilisateur</label>
            <input className="w11-input full-input" value={loginForm.login} onChange={e => setLoginForm(f => ({ ...f, login: e.target.value }))} />
          </div>
          <div style={{ marginBottom: 8 }}>
            <label className="w11-label">Mot de passe</label>
            <input type="password" className="w11-input full-input" value={loginForm.password}
              onChange={e => setLoginForm(f => ({ ...f, password: e.target.value }))}
              onKeyDown={e => e.key === "Enter" && doLogin()} />
          </div>
          <p style={{ fontSize: 10, color: "#888", marginBottom: 16 }}>Démo : <b>administrateur</b> / <b>admin123</b></p>
          <div style={{ display: "flex", justifyContent: "flex-end", gap: 8 }}>
            <button className="w11-btn">Annuler</button>
            <button className="w11-btn primary" onClick={doLogin}>🔓 Se connecter</button>
          </div>
        </div>
        <div className="login-footer">© 2026 Softwell Madagascar</div>
      </div>
    </div>
  );

  if (!dbConfigured) return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: "100vh", background: "#F3F3F3" }}>
      <div style={{ width: 540, background: "#FFFFFF", borderRadius: 12, boxShadow: "0 8px 32px rgba(0,0,0,0.12)", overflow: "hidden" }}>
        <div style={{ background: "#FAFAFA", borderBottom: "1px solid rgba(0,0,0,0.08)", padding: "10px 14px", display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 14 }}>⚙️</span>
          <span style={{ fontSize: 12, fontWeight: 600 }}>Configuration Base de Données — Première connexion</span>
        </div>
        <DBConfigScreen onSave={() => setDbConfigured(true)} />
      </div>
    </div>
  );

  const MENUS = {
    Fichier: [
      { l: "🔓 Déconnexion", a: () => { addAudit("Déconnexion", `Déconnexion de ${currentUser?.login}`); setLoggedIn(false); setCurrentUser(null); setDbConfigured(false); setWindows([]); } },
    ],
    Structure: [
      { l: "📁 Projets",                           a: () => openWindow("projets") },
      { l: "📅 Exercice Comptable",                a: () => openWindow("exercice") },
      { l: "🔗 Correspondances Comptes (CCOMPTEG)", a: () => openWindow("ccompteg") },
      { l: "📓 Journaux SNEL (CJOURNAL)",           a: () => openWindow("cjournal") },
      { l: "📔 Journaux TomPro (CJNL)",             a: () => openWindow("cjnl") },
      { l: "🏷️ Code Gestionnaire (CGESTIONN)",      a: () => openWindow("cgestionn") },
      { l: "🏢 Unité Budgétaire (CSR)",             a: () => openWindow("csr") },
    ],
    Traitement: [
      { l: "⚡ Lancer le Traitement", a: () => openWindow("traitement") },
    ],
    Administration: [
      { l: "👤 Gestion Utilisateurs", a: () => openWindow("users") },
      { l: "⚙️ Configuration BDD",    a: () => openWindow("dbconfig") },
      { l: "📋 Journal d'Audit",      a: () => openWindow("tracabilite") },
    ],
  };

  return (
    <div className="shell" onClick={() => setOpenMenu(null)}>
      <div className="global-menu" onClick={e => e.stopPropagation()}>
        <div className="global-menu-brand"><span style={{ fontSize: 15 }}>🔄</span> Moulinette TomPro → SNEL</div>
        {Object.entries(MENUS).map(([name, items]) => (
          <div key={name} style={{ position: "relative" }}>
            <button className={`menu-btn${openMenu === name ? " open" : ""}`} onClick={() => setOpenMenu(openMenu === name ? null : name)}>{name}</button>
            {openMenu === name && (
              <div className="dropdown">
                {items.map(it => <button key={it.l} className="dd-item" onClick={it.a}>{it.l}</button>)}
              </div>
            )}
          </div>
        ))}
        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10 }}>
          {audit.length > 0 && (
            <span style={{ fontSize: 10, color: "#5D5D5D", background: "rgba(0,95,184,0.07)", padding: "2px 8px", borderRadius: 3, cursor: "pointer" }}
              onClick={() => openWindow("tracabilite")}>
              📋 {audit.length} événement{audit.length > 1 ? "s" : ""}
            </span>
          )}
          <Badge label={currentUser?.role} bg={currentUser?.role === "ADMIN" ? "#FBEBE9" : "#E6F1FB"} color={currentUser?.role === "ADMIN" ? "#710F0F" : "#003E7E"} />
          <span style={{ fontSize: 11, color: "#5D5D5D" }}>{currentUser?.nom}</span>
        </div>
      </div>
      <div className="desktop">
        {windows.length === 0 && (
          <div className="desktop-hint"><div className="ico">🔄</div><p>Utilisez le menu pour ouvrir des fenêtres</p></div>
        )}
        {windows.map(w => {
          const def = WIN_DEFS[w.key];
          return (
            <MdiWindow key={w.key} id={w.key} title={def.title} icon={def.icon}
              width={w.w} height={w.h} posX={w.x} posY={w.y}
              focused={focusedId === w.key}
              onFocus={() => setFocusedId(w.key)}
              onClose={() => closeWindow(w.key)}>
              {renderContent(w.key)}
            </MdiWindow>
          );
        })}
      </div>
      <div className="taskbar">
        {windows.map(w => {
          const def = WIN_DEFS[w.key];
          return (
            <button key={w.key} className={`task-btn${focusedId === w.key ? " active" : ""}`} onClick={() => setFocusedId(w.key)}>
              <span style={{ fontSize: 14, flexShrink: 0 }}>{def.icon}</span>
              <span className="task-btn-label">{def.title.split(" — ")[0]}</span>
              <span className="task-close" onClick={e => { e.stopPropagation(); closeWindow(w.key); }}>✕</span>
            </button>
          );
        })}
        <div className="taskbar-clock">{clock} &nbsp; {new Date().toLocaleDateString("fr-FR")}</div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
